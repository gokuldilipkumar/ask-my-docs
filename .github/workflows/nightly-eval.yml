name: nightly-eval

on:
  schedule:
    - cron: "0 8 * * *"  # 08:00 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write  # the baseline-commit step pushes to the branch

concurrency:
  group: nightly-eval
  cancel-in-progress: false  # let an in-progress full eval (real API cost) finish; just queue the next one

jobs:
  full-eval:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync
      - name: Full eval gate + baseline update
        run: uv run python -m app.main eval --index data/index --save-baseline
      - name: Commit updated baseline
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eval/baselines/
          git diff --cached --quiet || git commit -m "[Data] Eval: nightly baseline update"
          git push
