chunking:
  min_tokens: 400
  max_tokens: 600
  overlap_pct: 0.15
  # FAA-H-8083-3C: chapter 1 starts at page index 21; glossary ends at 390
  # (kept - real definitional content); index 391-405 and front matter 0-20 dropped
  body_page_start: 21
  body_page_end: 390

retrieval:
  rrf_k: 60
  bm25_weight: 1.0
  vector_weight: 1.0
  top_n: 20

rerank:
  enabled: true
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k: 5

generation:
  model: claude-sonnet-4-5
  max_retries: 3
  backoff_base_seconds: 1.0

citations:
  low_confidence_threshold: 0.7

eval:
  judge_model: claude-haiku-4-5-20251001
  judge_temperature: 0.0

observability:
  langfuse_enabled: true
  daily_cost_cap_usd: 5.0
