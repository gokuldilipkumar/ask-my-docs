chunking:
  min_tokens: 400
  max_tokens: 600
  overlap_pct: 0.15

retrieval:
  rrf_k: 60
  bm25_weight: 1.0
  vector_weight: 1.0
  top_n: 20

rerank:
  enabled: true
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k: 5

generation:
  model: claude-sonnet-5
  max_tokens: 2048
  max_retries: 3
  timeout_seconds: 30.0

citations:
  low_confidence_threshold: 0.7
  judge_model: claude-haiku-4-5-20251001
  judge_temperature: 0.0
  max_tokens: 1024
  max_retries: 3
  timeout_seconds: 30.0

eval:
  judge_model: claude-haiku-4-5-20251001
  judge_temperature: 0.0
  golden_path: eval/golden/questions.yaml
  judge_max_tokens: 1024
  judge_max_retries: 3
  judge_timeout_seconds: 30.0

observability:
  langfuse_enabled: true
  daily_cost_cap_usd: 5.0
