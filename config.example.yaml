chunking:
  min_tokens: 400
  max_tokens: 600
  overlap_pct: 0.15

retrieval:
  rrf_k: 60
  bm25_weight: 1.0
  vector_weight: 1.0
  top_n: 10

rerank:
  enabled: true
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_k: 5
  max_length: 256

generation:
  model: claude-sonnet-5
  max_tokens: 2048
  max_retries: 3
  timeout_seconds: 30.0

citations:
  low_confidence_threshold: 0.7
  judge_model: claude-haiku-4-5-20251001
  judge_temperature: 0.0
  max_tokens: 1024
  max_retries: 3
  timeout_seconds: 30.0

eval:
  judge_model: claude-haiku-4-5-20251001
  judge_temperature: 0.0
  golden_path: eval/golden/questions.yaml
  judge_max_tokens: 1024
  judge_max_retries: 3
  judge_timeout_seconds: 30.0
  cache_path: data/eval_cache.sqlite3
  baseline_dir: eval/baselines
  tolerance: 0.1
  retrieval_k: 5

observability:
  langfuse_enabled: true
  daily_cost_cap_usd: 5.0
  cost_db_path: data/daily_cost.sqlite3
  price_table:
    claude-sonnet-5:
      input_per_million: 3.0
      output_per_million: 15.0
    claude-haiku-4-5-20251001:
      input_per_million: 1.0
      output_per_million: 5.0
