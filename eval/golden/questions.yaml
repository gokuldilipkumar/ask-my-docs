    - 4110ac96d7915420
    - 95e6cf4813a8a5d5
  reference_notes: >-
    A complete answer should address several facets of upset prevention and recovery
    training (UPRT): the academic/knowledge foundation (understanding what an upset is,
    its time-critical nature, and common causes like spatial disorientation,
    startle/surprise); maneuver-based/FSTD or aircraft-based practice to build correct,
    prompt recovery responses; the proportional counter-response principle (timely,
    correct control and thrust inputs matched to the specific upset); and awareness of
    common recovery errors (misdiagnosing the upset type, failing to disconnect the
    autopilot/wing leveler, failing to unload the airplane, rolling the wrong
    direction, mismanaging airspeed during recovery). A correct but narrow answer
    touching only one facet (e.g., only the academic portion) is incomplete.
